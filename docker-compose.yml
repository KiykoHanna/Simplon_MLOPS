version: "3.9"

services:
  api:
    build: ./app_api
    env_file:
      - .env
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ./:/app  # монтируем код для live reload
      - ./app.db:/app/app.db
    depends_on: []

  front:
    build: ./app_front
    env_file:
      - .env
    ports:
      - "${FRONT_PORT}:${FRONT_PORT}"
    volumes:
      - ./app_front:/app/app_front 
    depends_on:
      - api