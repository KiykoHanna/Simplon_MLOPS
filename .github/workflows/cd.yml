name: CD

on:
  push:
    tags:
      - "v*"

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build API image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mlops_api ./app_api

    - name: Build Front image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mlops_front ./app_front

    - name: Push images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/mlops_api
        docker push ${{ secrets.DOCKER_USERNAME }}/mlops_front